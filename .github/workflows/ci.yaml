name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      GOTOOLCHAIN: local  # Prevent Go from auto-downloading newer toolchains
    
    strategy:
      matrix:
        service: [auth-service, user-service, transaction-service]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
        cache-dependency-path: services/${{ matrix.service }}/go.sum
    
    - name: Download dependencies
      working-directory: services/${{ matrix.service }}
      run: go mod download
    
    - name: Verify dependencies
      working-directory: services/${{ matrix.service }}
      run: go mod verify
    
    - name: Lint
      working-directory: services/${{ matrix.service }}
      run: go vet ./...
    
    - name: Test
      working-directory: services/${{ matrix.service }}
      run: go test ./... -v -race -coverprofile=coverage.out
    
    - name: Build
      working-directory: services/${{ matrix.service }}
      run: go build -o bin/${{ matrix.service }} ./cmd/server
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: services/${{ matrix.service }}/coverage.out
        flags: ${{ matrix.service }}
        fail_ci_if_error: false
  
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        service: [auth-service, user-service, transaction-service]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -f services/${{ matrix.service }}/Dockerfile -t ${{ matrix.service }}:${{ github.sha }} .
        docker build -f services/${{ matrix.service }}/Dockerfile -t ${{ matrix.service }}:latest .
